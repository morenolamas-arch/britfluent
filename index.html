<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Britfluent — British English for Spanish Professionals</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d1f4e;--navy2:#162860;--navy3:#1e3478;
  --red:#d42b2b;--red2:#b82020;
  --white:#ffffff;--off:#f5f6fa;--off2:#eceef5;
  --ink:#0d1f4e;--ink2:#2a3a6c;--ink3:#6a7a9c;--ink4:#9aaac4;
  --bd:rgba(13,31,78,0.12);--bd2:rgba(13,31,78,0.06)
}
html,body{min-height:100%;background:var(--white)}
body{font-family:'Barlow',sans-serif;color:var(--ink)}

/* ── ANNOUNCEMENT BAR ── */
.ann-bar{background:var(--navy);color:var(--white);text-align:center;padding:10px 20px;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.ann-bar span{color:var(--red);margin:0 8px}

/* ── NAV ── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--bd2);background:var(--white);max-width:100%}
.nav-logo{display:flex;align-items:center;gap:14px;cursor:pointer}
.roundel{width:54px;height:54px;border-radius:50%;background:var(--red);border:3px solid var(--navy);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.roundel-bar{position:absolute;width:100%;height:11px;background:var(--white);top:50%;transform:translateY(-50%);border-top:1px solid rgba(13,31,78,0.15);border-bottom:1px solid rgba(13,31,78,0.15)}
.roundel-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:var(--white);position:relative;z-index:1;letter-spacing:1px}
.nav-brand{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--navy);letter-spacing:2px;text-transform:uppercase}
.nav-brand span{color:var(--red)}
.nav-tag{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--ink3)}

/* ── WELCOME HERO ── */
.hero{display:grid;grid-template-columns:55% 45%;gap:0;min-height:calc(100vh - 120px);background:var(--white)}
.hero-left{padding:48px 40px 48px 48px;display:flex;flex-direction:column;justify-content:center;position:relative}
.hero-kicker{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.hero-kicker-line{width:40px;height:3px;background:var(--red)}
.hero-kicker-text{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--navy)}
.hero-headline{font-family:'Barlow Condensed',sans-serif;font-size:clamp(48px,5.5vw,72px);font-weight:900;line-height:0.92;text-transform:uppercase;margin-bottom:28px;letter-spacing:-1px}
.hero-headline .navy{color:var(--navy)}
.hero-headline .red{color:var(--red)}
.hero-sub{font-size:16px;color:var(--ink3);line-height:1.7;max-width:440px;margin-bottom:32px}
.feats-row{display:flex;gap:28px;margin-bottom:40px}
.feat-item{display:flex;align-items:center;gap:8px}
.feat-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0}
.feat-text{font-size:13px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:1px}

/* ── HERO RIGHT CARD ── */
.hero-right{background:var(--off);border-left:4px solid var(--navy);display:flex;flex-direction:column;justify-content:center;padding:48px 36px;position:relative}
.hero-right::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:var(--red)}
.card-badge{display:inline-block;background:rgba(212,43,43,0.1);color:var(--red);font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;padding:6px 14px;border-radius:2px;margin-bottom:20px}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--navy);text-transform:uppercase;letter-spacing:1px;line-height:1.1;margin-bottom:16px}
.card-desc{font-size:14.5px;color:var(--ink3);line-height:1.7;margin-bottom:28px}
.card-desc strong{color:var(--navy);font-weight:700}
.feats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px}
.feat-box{background:var(--white);border:1px solid var(--bd);border-radius:3px;padding:14px 12px;text-align:center}
.feat-box-n{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--red);line-height:1;display:block;margin-bottom:3px}
.feat-box-l{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3)}
.btn-begin{width:100%;background:var(--red);color:var(--white);border:none;padding:22px;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background 0.2s;border-radius:2px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(212,43,43,0.3)}
.btn-begin:hover{background:var(--red2)}
.btn-begin-arrow{font-size:22px}
.card-promise{font-size:15px;color:var(--ink2);line-height:1.7;margin-bottom:28px;border-left:3px solid var(--red);padding-left:14px;font-weight:500}
.card-note{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--ink4);text-align:center;margin-top:12px}

/* ── TASK ── */
.page-wrap{max-width:100%;background:var(--white)}
.task-topbar{background:var(--navy);padding:14px 48px;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{display:flex;align-items:center;gap:12px}
.topbar-roundel{width:38px;height:38px;border-radius:50%;background:var(--red);border:2.5px solid var(--white);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.topbar-roundel-bar{position:absolute;width:100%;height:8px;background:var(--navy);top:50%;transform:translateY(-50%)}
.topbar-roundel-t{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;color:var(--white);position:relative;z-index:1;letter-spacing:0.5px}
.topbar-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--white);letter-spacing:2px;text-transform:uppercase}
.topbar-name span{color:var(--red)}
.topbar-progress{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.prog-bar{height:4px;background:rgba(255,255,255,0.15);overflow:hidden}
.prog-fill{height:100%;background:var(--red);transition:width 0.5s ease}

.task-inner{max-width:700px;margin:0 auto;padding:36px 24px 60px}
.task-kicker{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.task-kicker-line{width:28px;height:3px;background:var(--red)}
.task-kicker-text{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--red)}
.task-label{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;color:var(--navy);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.task-feat{font-size:13px;font-weight:600;color:var(--ink3);letter-spacing:1px;margin-bottom:28px}

.sentence-card{background:var(--white);border:2px solid var(--navy);border-radius:3px;padding:32px 32px;margin-bottom:18px;position:relative;overflow:hidden}
.sentence-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--red)}
.sentence-txt{font-family:'Barlow Condensed',sans-serif;font-size:clamp(22px,3vw,32px);line-height:1.45;color:var(--navy);font-weight:700;padding-left:8px}
.task-instr{font-size:13px;font-weight:600;color:var(--ink3);text-align:center;margin-bottom:20px;background:var(--off);padding:12px 18px;border-radius:3px;border-left:3px solid var(--red);font-style:italic}

.hear-row{display:flex;justify-content:center;margin-bottom:20px}
.btn-hear{background:var(--white);border:2px solid var(--navy);color:var(--navy);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:10px 24px;border-radius:2px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.15s}
.btn-hear:hover{background:var(--navy);color:var(--white)}
.rec-zone{text-align:center}
.btn-rec{background:var(--red);color:var(--white);border:none;border-radius:2px;padding:15px 44px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:2px;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:10px;transition:background 0.15s}
.btn-rec:hover{background:var(--red2)}
.btn-stop{background:rgba(212,43,43,0.08);color:var(--red);border:2px solid var(--red);border-radius:2px;padding:15px 44px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:2px;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:10px}
.pulse{width:10px;height:10px;border-radius:50%;background:var(--red);display:inline-block;animation:pulse 0.9s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.65)}}
.err{color:var(--red);font-size:13px;margin-top:10px;font-weight:700}
.analyzing{text-align:center;padding:16px;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink3)}
.analyzing-spin{display:inline-block;animation:spin 1s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PRONUNCIATION RESULTS ── */
.pron-results{margin-top:16px;background:var(--white);border:2px solid var(--navy);border-radius:3px;overflow:hidden}
.pron-header{background:var(--navy);padding:12px 18px;display:flex;justify-content:space-between;align-items:center}
.pron-lbl{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.pron-score-pill{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;padding:3px 14px;border-radius:2px;letter-spacing:1px}
.pill-good{background:rgba(61,180,88,0.2);color:#3db458}
.pill-ok{background:rgba(212,180,43,0.2);color:#c4a224}
.pill-bad{background:rgba(212,43,43,0.2);color:var(--red)}
.words-row{padding:18px 18px 12px;display:flex;flex-wrap:wrap;gap:6px 10px;font-family:'Barlow Condensed',sans-serif;font-size:clamp(20px,2.8vw,26px);font-weight:700}
.word-btn{background:none;border:none;cursor:pointer;font-family:inherit;font-size:inherit;font-weight:inherit;padding:3px 6px;border-radius:2px;border-bottom:3px solid transparent;transition:all 0.15s;position:relative;letter-spacing:0.5px;text-transform:uppercase}
.word-good{color:#2a7a3a;border-bottom-color:rgba(42,122,58,0.5)}
.word-ok{color:#8a6a0a;border-bottom-color:rgba(138,106,10,0.4)}
.word-bad{color:var(--red);border-bottom-color:rgba(212,43,43,0.5)}
.word-skip{color:var(--ink4);cursor:default}
.word-btn:hover:not(.word-skip){background:var(--off)}

/* phoneme popup */
.phoneme-popup{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--white);border:2px solid var(--navy);border-radius:3px;box-shadow:0 8px 24px rgba(13,31,78,0.15);z-index:100;min-width:230px;overflow:hidden}
.phoneme-popup-header{background:var(--navy);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.phoneme-word{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--white);letter-spacing:2px;text-transform:uppercase}
.phoneme-close{color:rgba(255,255,255,0.5);background:none;border:none;cursor:pointer;font-size:16px;line-height:1}
.phoneme-table{width:100%;border-collapse:collapse}
.phoneme-table th{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink3);padding:7px 12px;text-align:left;border-bottom:1px solid var(--bd2)}
.phoneme-table td{padding:8px 12px;font-size:14px;border-bottom:1px solid var(--bd2)}
.phoneme-table tr:last-child td{border-bottom:none}
.ph-symbol{font-family:'Courier New',monospace;font-size:16px;font-weight:700}
.ph-good{color:#2a7a3a}.ph-ok{color:#8a6a0a}.ph-bad{color:var(--red)}
.ph-score{font-family:'Courier New',monospace;font-size:13px;font-weight:700}
.score-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd);border-top:1px solid var(--bd)}
.metric{background:var(--off);padding:14px;text-align:center}
.metric-n{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;letter-spacing:1px}
.metric-l{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink3);margin-top:3px}
.words-key{display:flex;gap:14px;padding:10px 18px;border-top:1px solid var(--bd2);background:var(--off)}
.wk-item{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--ink3)}
.wk-dot{width:9px;height:9px;border-radius:50%}

/* pitch */
.pitch-wrap{margin-top:12px;background:var(--white);border:2px solid var(--navy);border-radius:3px;overflow:hidden}
.pitch-header{background:var(--navy);display:flex;justify-content:space-between;align-items:center;padding:10px 14px}
.pitch-lbl{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.pitch-legend{display:flex;gap:14px}
.pitch-leg-item{display:flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:rgba(255,255,255,0.5)}
.pitch-leg-dot{width:8px;height:8px;border-radius:50%}
.pitch-svg-wrap{padding:10px 14px 6px;background:var(--off)}
.pitch-svg{width:100%;display:block}

.diff-row{margin-top:18px;text-align:center}
.diff-lbl{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.diff-btns{display:flex;justify-content:center;gap:8px}
.diff-btn{width:38px;height:38px;border-radius:50%;border:2px solid var(--bd);background:var(--white);color:var(--ink3);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.15s}
.diff-btn:hover,.diff-btn.on{background:var(--navy);color:var(--white);border-color:var(--navy)}
.btn-next{width:100%;margin-top:22px;background:var(--navy);color:var(--white);border:none;border-radius:2px;padding:16px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background 0.15s}
.btn-next:hover{background:var(--navy2)}
.btn-next:disabled{background:var(--off2);color:var(--ink4);cursor:not-allowed}

/* ── PROCESSING ── */
.proc-wrap{min-height:100vh;background:var(--white);display:flex;flex-direction:column}
.proc-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
.proc-roundel{width:80px;height:80px;border-radius:50%;background:var(--red);border:4px solid var(--navy);display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:28px;animation:spin 6s linear infinite}
.proc-roundel-bar{position:absolute;width:100%;height:16px;background:var(--white);top:50%;transform:translateY(-50%)}
.proc-roundel-t{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:var(--white);position:relative;z-index:1;letter-spacing:1px}
.proc-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:var(--navy);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.proc-sub{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink3)}
.proc-steps{max-width:340px;text-align:left;margin-top:32px}
.step-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--bd2);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.step-done{color:#3db458}.step-active{animation:blink 1.2s ease-in-out infinite;color:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}
.step-wait{color:var(--ink4)}
.step-text-done{color:var(--ink2)}.step-text-active{color:var(--navy)}.step-text-wait{color:var(--ink4)}

/* ── REPORT ── */
.report-page{background:var(--white)}
.rep-inner{max-width:760px;margin:0 auto;padding:40px 24px 64px}
.rep-score-block{display:flex;align-items:center;gap:24px;margin-bottom:32px;background:var(--navy);border-radius:3px;padding:28px 32px;position:relative;overflow:hidden}
.rep-score-block::after{content:'';position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:rgba(212,43,43,0.08)}
.score-ring{width:90px;height:90px;border-radius:50%;background:var(--red);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:3px solid rgba(255,255,255,0.25)}
.ring-n{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:var(--white);line-height:1}
.ring-l{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-top:2px;font-weight:700}
.rep-score-text{flex:1}
.rep-kicker{font-size:10px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--red);margin-bottom:6px}
.rep-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:var(--white);text-transform:uppercase;letter-spacing:2px;line-height:1}
.rep-level{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-top:8px}

.coach-card{background:var(--off);border-left:5px solid var(--red);border-radius:3px;padding:24px 28px;margin-bottom:28px}
.coach-name{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:10px}
.coach-quote{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:600;line-height:1.65;color:var(--navy);font-style:italic}
.coach-l1{margin-top:12px;font-size:13px;color:var(--ink3);padding-top:12px;border-top:1px solid var(--bd);font-weight:500}

.section-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--navy);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;padding-bottom:10px;border-bottom:3px solid var(--navy);display:flex;align-items:center;gap:10px}
.section-title::before{content:'';display:block;width:5px;height:20px;background:var(--red);border-radius:1px;flex-shrink:0}

.ov-card{background:var(--white);border:2px solid var(--navy);border-radius:3px;padding:20px 22px;margin-bottom:28px}
.ov-row{display:grid;grid-template-columns:155px 1fr 50px;gap:12px;align-items:center;margin-bottom:10px}
.ov-row:last-child{margin-bottom:0}
.ov-label{font-size:12px;font-weight:800;color:var(--ink);text-transform:uppercase;letter-spacing:0.5px}
.ov-bar{height:8px;background:var(--off2);border-radius:2px;overflow:hidden}
.ov-fill{height:100%;border-radius:2px;transition:width 1.1s ease}
.ov-pct{font-size:13px;font-weight:700;text-align:right;font-family:'Courier New',monospace}

.str-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.str-chip{background:var(--off);border:2px solid var(--navy);border-radius:3px;padding:12px 14px;font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.55;display:flex;align-items:flex-start;gap:8px}
.str-check{color:var(--red);font-size:16px;font-weight:900;flex-shrink:0;font-family:'Barlow Condensed',sans-serif}

.issue-card{background:var(--white);border:2px solid var(--navy);border-radius:3px;margin-bottom:10px;overflow:hidden}
.issue-head{display:flex;align-items:center;gap:11px;padding:14px 18px;cursor:pointer;user-select:none;transition:background 0.1s}
.issue-head:hover{background:var(--off)}
.pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-c{background:var(--red)}.dot-w{background:#c4a224}.dot-g{background:#3db458}
.issue-rank{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--ink4);width:20px;flex-shrink:0}
.issue-area{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--navy);flex:1;text-transform:uppercase;letter-spacing:1px}
.ipa-tag{font-family:'Courier New',monospace;font-size:11px;color:var(--ink3);background:var(--off2);padding:3px 7px;border-radius:2px;font-weight:700}
.priority-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:2px;white-space:nowrap}
.tag-c{background:rgba(212,43,43,0.1);color:var(--red)}
.tag-w{background:rgba(196,162,36,0.12);color:#8a6a0a}
.tag-g{background:rgba(61,180,88,0.1);color:#2a7a3a}
.chevron{font-size:10px;color:var(--ink4);transition:transform 0.2s;display:inline-block;font-weight:900}

// ── AUDIO ─────────────────────────────────────────────────────────────────
let audioCtx=null,analyserNode=null,mediaStream=null,mediaRecorder=null,pitchSamples=[],pitchTimer=null,audioChunks=[];
function getBestMimeType(){
  const types=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4','audio/aac',''];
  for(const t of types){if(t===''||MediaRecorder.isTypeSupported(t)){console.log('[Britfluent] Using MIME type:',t||'default');return t;}}

async function startRecording(){pitchSamples=[];audioChunks=[];try{mediaStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});audioCtx=new(window.AudioContext||window.webkitAudioContext)();const src=audioCtx.createMediaStreamSource(mediaStream);analyserNode=audioCtx.createAnalyser();analyserNode.fftSize=2048;analyserNode.smoothingTimeConstant=0.15;src.connect(analyserNode);pitchTimer=setInterval(()=>pitchSamples.push(getPitch(analyserNode,audioCtx.sampleRate)),80);const mimeType=getBestMimeType();const opts=mimeType?{mimeType}:{};mediaRecorder=new MediaRecorder(mediaStream,opts);mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};mediaRecorder.start();}catch(e){console.error('Recording error:',e);}}
function stopRecording(){return new Promise(resolve=>{if(pitchTimer){clearInterval(pitchTimer);pitchTimer=null;}if(mediaRecorder&&mediaRecorder.state!=='inactive'){mediaRecorder.onstop=()=>{const mT=mediaRecorder&&mediaRecorder.mimeType?mediaRecorder.mimeType:'audio/webm';const blob=new Blob(audioChunks,{type:mT});console.log('[Britfluent] Blob:',blob.size,'bytes type:',mT);if(audioCtx){audioCtx.close();audioCtx=null;}if(mediaStream){mediaStream.getTracks().forEach(t=>t.stop());mediaStream=null;}resolve({blob,pitchSamples:[...pitchSamples]});};mediaRecorder.stop();}else{if(audioCtx){audioCtx.close();audioCtx=null;}if(mediaStream){mediaStream.getTracks().forEach(t=>t.stop());mediaStream=null;}resolve({blob:null,pitchSamples:[...pitchSamples]});}})}
function getPitch(analyser,sampleRate){const buf=new Float32Array(analyser.fftSize);analyser.getFloatTimeDomainData(buf);const SIZE=buf.length,half=Math.floor(SIZE/2);let rms=0;for(let i=0;i<SIZE;i++)rms+=buf[i]*buf[i];if(Math.sqrt(rms/SIZE)<0.01)return 0;const minP=Math.floor(sampleRate/500),maxP=Math.floor(sampleRate/70);let best=-1,bestP=-1,last=1,found=false;for(let p=minP;p<maxP&&p<half;p++){let c=0;for(let i=0;i<half;i++)c+=buf[i]*buf[i+p];c/=half;if(c>0.3&&c>last){found=true;if(c>best){best=c;bestP=p;}}else if(found)break;last=c;}return bestP===-1||best<0.3?0:sampleRate/bestP;}

function buildPitchSVG(samples){const voiced=samples.filter(s=>s>70&&s<500);if(voiced.length<4)return null;const W=560,H=86,pL=30,pR=8,pT=8,pB=20,iW=W-pL-pR,iH=H-pT-pB;const minHz=70,maxHz=380,cl=v=>Math.max(minHz,Math.min(maxHz,v));const sm=samples.map((v,i,a)=>{if(v===0)return 0;let s=0,c=0;for(let j=Math.max(0,i-2);j<=Math.min(a.length-1,i+2);j++){if(a[j]>0){s+=a[j];c++;}}return c?s/c:0;});const n=sm.length,xS=iW/(n-1),yM=hz=>pT+iH-((cl(hz)-minHz)/(maxHz-minHz))*iH;let path='',fill='',inSeg=false;for(let i=0;i<n;i++){const x=(pL+i*xS).toFixed(1),y=sm[i]>0?yM(sm[i]).toFixed(1):null;if(y){if(!inSeg){path+=`M${x} ${y} `;fill+=`M${x} ${(pT+iH).toFixed(1)} L${x} ${y} `;inSeg=true;}else{path+=`L${x} ${y} `;fill+=`L${x} ${y} `;}}else if(inSeg){const px=(pL+(i-1)*xS).toFixed(1);fill+=`L${px} ${(pT+iH).toFixed(1)} Z `;inSeg=false;}}if(inSeg){const lx=(pL+(n-1)*xS).toFixed(1);fill+=`L${lx} ${(pT+iH).toFixed(1)} Z`;}const refs=[120,180,250,320].map(hz=>{const y=yM(hz).toFixed(1);return`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="rgba(13,31,78,0.1)" stroke-width="1"/><text x="${pL-3}" y="${y}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#9aaac4" font-family="'Barlow',sans-serif" font-weight="700">${hz}</text>`;}).join('');return`<svg viewBox="0 0 ${W} ${H}" class="pitch-svg" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d42b2b"/><stop offset="100%" stop-color="#0d1f4e"/></linearGradient></defs>${refs}<path d="${fill}" fill="url(#pg)" opacity="0.15"/><path d="${path}" fill="none" stroke="url(#pg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><text x="${pL}" y="${H-3}" font-size="9" fill="#9aaac4" font-family="'Barlow',sans-serif" font-weight="700">time →</text></svg>`;}

  }else{
    rz.innerHTML=`<button class="btn-stop" id="bs"><span class="pulse"></span> STOP RECORDING</button>`;
    rz.querySelector('#bs').onclick=async()=>{tRecording=false;tAnalyzing=true;updateTaskUI(container,task);const{blob,pitchSamples}=await stopRecording();tPitch=pitchSamples;try{const raw=await scorePronunciation(blob,task.sent);tResult=parseSpeechaceResult(raw);if(!tResult)throw new Error('No result');}catch(e){console.error('Speechace error:',e);tErr='Could not analyse — please try again.';}tAnalyzing=false;updateTaskUI(container,task);};
  }
  if(tResult){
    const sc=tResult.overall,pillCls=sc>=80?'pill-good':sc>=60?'pill-ok':'pill-bad';
    let html=`<div class="pron-results"><div class="pron-header"><span class="pron-lbl">PRONUNCIATION SCORE</span><span class="pron-score-pill ${pillCls}">${sc}%</span></div>
    <div class="words-row">${tResult.words.map((w,wi)=>`<button class="word-btn ${w.score>=80?'word-good':w.score>=60?'word-ok':'word-bad'}" data-wi="${wi}">${w.word}</button>`).join(' ')}</div>
    <div class="score-metrics">
      <div class="metric"><div class="metric-n" style="color:${sc>=80?'#2a7a3a':sc>=60?'#8a6a0a':'var(--red)'}">${sc}%</div><div class="metric-l">Pronunciation</div></div>
      <div class="metric"><div class="metric-n" style="color:${sc>=80?'#2a7a3a':sc>=60?'#8a6a0a':'var(--red)'}">${tResult.words.filter(w=>w.score>=80).length}/${tResult.words.length}</div><div class="metric-l">Words correct</div></div>
      <div class="metric"><div class="metric-n" style="color:var(--navy)">en-GB</div><div class="metric-l">RP Model</div></div>
    </div>
    <div class="words-key">
      <div class="wk-item"><div class="wk-dot" style="background:#2a7a3a"></div>Good (80%+)</div>
      <div class="wk-item"><div class="wk-dot" style="background:#8a6a0a"></div>Needs work (60–79%)</div>
      <div class="wk-item"><div class="wk-dot" style="background:var(--red)"></div>Focus here (&lt;60%)</div>
    </div></div>`;
    const svg=buildPitchSVG(tPitch);
    if(svg){html+=`<div class="pitch-wrap"><div class="pitch-header"><span class="pitch-lbl">INTONATION CURVE</span><div class="pitch-legend"><div class="pitch-leg-item"><div class="pitch-leg-dot" style="background:var(--red)"></div>high</div><div class="pitch-leg-item"><div class="pitch-leg-dot" style="background:var(--navy)"></div>low</div></div></div><div class="pitch-svg-wrap">${svg}</div></div>`;}
    va.innerHTML=html;
    va.querySelectorAll('.word-btn').forEach(btn=>{btn.onclick=(e)=>{e.stopPropagation();va.querySelectorAll('.phoneme-popup').forEach(p=>p.remove());const w=tResult.words[+btn.dataset.wi];if(!w.phonemes.length)return;const popup=el('div','phoneme-popup');popup.innerHTML=`<div class="phoneme-popup-header"><span class="phoneme-word">${w.word}</span><button class="phoneme-close" id="pc">✕</button></div><table class="phoneme-table"><tr><th>Phoneme</th><th>Score</th><th>Note</th></tr>${w.phonemes.map(p=>{const cls=p.score>=80?'ph-good':p.score>=60?'ph-ok':'ph-bad';const note=p.score>=80?'Good':p.soundMostLike?`Sounds like /${p.soundMostLike}/`:'Needs work';return`<tr><td><span class="ph-symbol ${cls}">/${p.symbol}/</span></td><td class="${cls} ph-score">${p.score}%</td><td class="${cls}">${note}</td></tr>`;}).join('')}</table>`;btn.style.position='relative';btn.appendChild(popup);popup.querySelector('#pc').onclick=(e)=>{e.stopPropagation();popup.remove();};};});
    document.addEventListener('click',()=>va.querySelectorAll('.phoneme-popup').forEach(p=>p.remove()),{once:true});
  }else{va.innerHTML='';}
  if(tResult){da.innerHTML=`<div class="diff-row"><div class="diff-lbl">HOW DIFFICULT? (OPTIONAL)</div><div class="diff-btns">${[1,2,3,4,5].map(n=>`<button class="diff-btn${tDiff===n?' on':''}" data-n="${n}">${n}</button>`).join('')}</div></div>`;da.querySelectorAll('.diff-btn').forEach(b=>b.onclick=()=>{tDiff=+b.dataset.n;updateTaskUI(container,task);});}else{da.innerHTML='';}
  bn.disabled=!tResult;
}

// ── PROCESSING ────────────────────────────────────────────────────────────
const PSTEPS=["Analysing phoneme scores","Evaluating vowel quality","Assessing stress patterns","Detecting Spanish L1 interference","Measuring intonation contours","Writing your coaching report"];
function renderProcessing(){
  const d=el('div','proc-wrap');
  d.innerHTML=`
  <div class="ann-bar">ANALYSING YOUR PRONUNCIATION — PLEASE WAIT</div>
  <nav class="nav"><div class="nav-logo"><div class="roundel"><div class="roundel-bar"></div><span class="roundel-text">BF</span></div><span class="nav-brand">BRIT<span>FLUENT</span></span></div></nav>
  <div class="proc-body">
    <div class="proc-roundel"><div class="proc-roundel-bar"></div><span class="proc-roundel-t">BF</span></div>
    <div class="proc-title">ANALYSING YOUR VOICE</div>
    <div class="proc-sub">YOUR PERSONALISED REPORT IS BEING PREPARED</div>
    <div class="proc-steps">${PSTEPS.map((s,i)=>`<div class="step-row"><span class="${i<state.procStep?'step-done':i===state.procStep?'step-active':'step-wait'}">${i<state.procStep?'✓':i===state.procStep?'◉':'○'}</span><span class="${i<state.procStep?'step-text-done':i===state.procStep?'step-text-active':'step-text-wait'}">${s.toUpperCase()}</span></div>`).join('')}
    </div>
  </div>`;
  return d;
}
async function runProcessing(results){setState({phase:'processing',procStep:0});for(let i=0;i<6;i++){await wait(700);setState({procStep:i+1});}try{const r=await genReport(results);setState({phase:'report',report:r});}catch(e){console.error(e);setState({phase:'report',report:FALLBACK});}}

// ── REPORT ────────────────────────────────────────────────────────────────
function renderReport(){
  const rep=state.report,score=rep.overallReadiness||74;
  const level=score>=80?'ADVANCED':score>=65?'DEVELOPING':score>=50?'FOUNDATION':'BEGINNER';
  const d=el('div','report-page');
  let html=`
  <div class="ann-bar">YOUR BRITFLUENT RP DIAGNOSTIC REPORT</div>
  <nav class="nav"><div class="nav-logo"><div class="roundel"><div class="roundel-bar"></div><span class="roundel-text">BF</span></div><span class="nav-brand">BRIT<span>FLUENT</span></span></div><span class="nav-tag">RP DIAGNOSTIC REPORT</span></nav>
  <div class="rep-inner">
  <div class="rep-score-block">
    <div class="score-ring"><span class="ring-n">${score}</span><span class="ring-l">RP SCORE</span></div>
    <div class="rep-score-text">
      <div class="rep-kicker">BRITISH ENGLISH DIAGNOSTIC</div>
      <div class="rep-title">YOUR RP PROFILE</div>
      <div class="rep-level">${level} LEVEL</div>
    </div>
  </div>
  <div class="coach-card">
    <div class="coach-name">DR. ELEANOR ASHWORTH · LAMDA VOICE COACH</div>
    <div class="coach-quote">"${rep.coachSummary}"</div>
    ${rep.nativeLanguageProfile?`<div class="coach-l1">🔍 ${rep.nativeLanguageProfile}</div>`:''}
  </div>`;
  if(rep.issues?.length){html+=`<div class="section-title">AT A GLANCE</div><div class="ov-card">`;rep.issues.forEach(iss=>{const bc=iss.priority==='critical'?'#d42b2b':iss.priority==='needs_work'?'#c4a224':'#3db458';html+=`<div class="ov-row"><span class="ov-label">${iss.area}</span><div class="ov-bar"><div class="ov-fill" style="width:${iss.score||50}%;background:${bc}"></div></div><span class="ov-pct" style="color:${bc}">${iss.score||'—'}%</span></div>`;});html+=`</div>`;}
  if(rep.strengths?.length){html+=`<div class="section-title">WHAT YOU'RE DOING WELL</div><div class="str-grid">${rep.strengths.map(s=>`<div class="str-chip"><span class="str-check">✓</span>${s}</div>`).join('')}</div>`;}
  html+=`<div class="section-title">PRIORITY AREAS — RANKED BY IMPACT</div>`;
  if(rep.priorityOrder){html+=`<div style="background:var(--off);border-left:5px solid var(--red);border-radius:3px;padding:14px 18px;margin-bottom:18px;font-size:14.5px;color:var(--ink2);line-height:1.8;font-style:italic;font-weight:600">${rep.priorityOrder}</div>`;}
  html+=`<div id="il"></div>`;
  if(rep.weekPlan?.length){html+=`<div class="section-title">YOUR FIRST WEEK PLAN</div><div class="week-grid">${rep.weekPlan.map(s=>`<div class="week-card"><div class="week-day">${s.day}</div><div class="week-task">${s.task}</div><div class="week-detail">${s.detail}</div></div>`).join('')}</div>`;}
  html+=`<div class="rep-footer"><button class="btn-restart" id="br2">↺ TAKE THE ASSESSMENT AGAIN</button><div class="rep-tagline">REASSESS EVERY 2–4 WEEKS · BRITFLUENT</div></div>
  </div>`;
  d.innerHTML=html;
  d.querySelector('#br2').onclick=()=>setState({phase:'welcome',taskIdx:0,results:[],report:null});
  const list=d.querySelector('#il');(rep.issues||[]).forEach(iss=>list.appendChild(renderIssueCard(iss)));
  return d;
}

function renderIssueCard(iss){
  const isOpen=iss.priority==='critical'||iss.rank<=2;
  const bc=iss.priority==='critical'?'#d42b2b':iss.priority==='needs_work'?'#c4a224':'#3db458';
  const tl=iss.priority==='critical'?'CRITICAL':iss.priority==='needs_work'?'NEEDS WORK':'GOOD';
  const card=el('div','issue-card');let open=isOpen;
  const head=el('div','issue-head');
  head.innerHTML=`<span class="issue-rank">${iss.rank}</span><span class="pdot ${iss.priority==='critical'?'dot-c':iss.priority==='needs_work'?'dot-w':'dot-g'}"></span><span class="issue-area">${iss.area}</span>${iss.phonemes?`<span class="ipa-tag">${iss.phonemes}</span>`:''}<span class="priority-tag ${iss.priority==='critical'?'tag-c':iss.priority==='needs_work'?'tag-w':'tag-g'}">${tl}</span><span class="chevron${open?' open':''}">▼</span>`;
  const bw=el('div','issue-bar-wrap');bw.innerHTML=`<div class="issue-bar"><div class="issue-bar-fill" style="width:${iss.score||50}%;background:${bc}"></div></div>`;
  const body=el('div','issue-body');body.style.display=open?'':'none';
  body.innerHTML=`<div><div class="ilbl">Diagnosis</div><div class="itxt">${iss.diagnosis}</div></div><div class="ifix-box"><div class="ilbl">How to fix it</div><div class="itxt">${iss.fix}</div></div>${iss.example?`<div class="iex">"${iss.example}"</div>`:''}${iss.timeToFix?`<div class="itime">⏱ ${iss.timeToFix}</div>`:''}`;
  head.onclick=()=>{open=!open;body.style.display=open?'':'none';head.querySelector('.chevron').classList.toggle('open',open);};
  card.append(head,bw,body);return card;
}

function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}
render();
</script>
</body>
</html>
